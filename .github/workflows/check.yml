name: Lilara CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  check:
    name: Checks (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.allow_failure == true }}

    defaults:
      run:
        shell: bash

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            bench_p99_ms: "10"
          - os: windows-latest
            bench_p99_ms: "500"
          - os: macos-latest
            bench_p99_ms: "200"

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Status summary
        run: bash scripts/status-summary.sh

      - name: Version / changelog sync check
        run: bash scripts/check-version.sh --check-changelog

      - name: Audit local (scripts + hooks)
        run: bash scripts/audit-local.sh

      - name: No stale pre-Lilara brand references
        run: bash scripts/check-no-horus.sh

      - name: Scope decision-tag integrity
        run: bash scripts/check-scope-tags.sh

      - name: Audit examples (prose + GOOD blocks)
        # Exit 1 only if risky patterns found — known false positives allowed via exclusions
        run: |
          bash scripts/audit-examples.sh || {
            echo "audit-examples found matches — review output above."
            exit 1
          }

      - name: Hook integrity check
        run: bash scripts/verify-hooks-integrity.sh

      - name: Run fixtures (classify + hooks + redact)
        run: bash scripts/run-fixtures.sh

      - name: Contract migration v2→v3 gate
        run: bash scripts/check-migrate-v2-v3.sh

      - name: Check registries
        run: bash scripts/check-registries.sh

      - name: Check skills (errors only)
        run: bash scripts/check-skills.sh --errors-only

      - name: Integration smoke test
        run: bash scripts/check-integration-smoke.sh

      - name: Check installation
        run: bash scripts/check-installation.sh

      - name: Install smoke (runtime enforcement end-to-end)
        run: bash scripts/check-install-smoke.sh

      - name: Check config integration
        run: bash scripts/check-config-integration.sh

      - name: Check runtime core
        run: bash scripts/check-runtime-core.sh

      - name: Check runtime CLI
        run: bash scripts/check-runtime-cli.sh

      - name: Check hook edge cases
        run: bash scripts/check-hook-edge-cases.sh

      - name: Check apply status
        run: bash scripts/check-apply-status.sh

      - name: Check executables
        run: bash scripts/check-executables.sh

      - name: Check setup wizard
        run: bash scripts/check-setup-wizard.sh

      - name: Check wiring docs
        run: bash scripts/check-wiring-docs.sh

      - name: Check superiority evidence
        run: bash scripts/check-superiority-evidence.sh

      - name: Check status docs
        run: bash scripts/check-status-docs.sh

      - name: Check status artifact
        run: bash scripts/check-status-artifact.sh

      - name: Check fixture count
        run: bash scripts/check-fixture-count.sh

      - name: Check harness support
        run: bash scripts/check-harness-support.sh

      - name: Check OWASP coverage
        run: bash scripts/check-owasp-coverage.sh

      - name: Check scenarios
        run: bash scripts/check-scenarios.sh

      - name: Check OpenCode adapter
        run: bash scripts/check-opencode-adapter.sh

      - name: Check OpenClaw adapter
        run: bash scripts/check-openclaw-adapter.sh

      - name: Check Claw Code adapter
        run: bash scripts/check-clawcode-adapter.sh

      - name: Check Codex adapter
        run: bash scripts/check-codex-adapter.sh

      - name: Check antegravity adapter
        run: bash scripts/check-antegravity-adapter.sh

      - name: Check zero deps (runtime/)
        run: bash scripts/check-zero-deps.sh

      - name: Inviolable tier regression gate (SCOPE §19 #6, P3.1)
        # Axis (a): canDemote(inviolable, *) === false for every demotion source the engine uses.
        # Axis (b): any change to runtime/decision-lattice.js or runtime/floor-codes.js
        # in the merge-base range must be accompanied by an artifacts/lattice-baseline.sha256
        # rebaseline AND a [LATTICE-BASELINE-REBASELINE] marker in CHANGELOG.md.
        # This is the standing gate for the §19 #6 (LOCKED 2026-06-13) policy-laundering
        # and self-modification-poisoning regression — it must land BEFORE any L3 code.
        run: bash scripts/check-inviolable-tier-unreachability.sh origin/master

      - name: Check counts
        run: bash scripts/check-counts.sh

      - name: Taint egress gate (ADR-037 F28)
        run: bash scripts/check-taint-egress.sh

      - name: Delete coordination gate (ADR-038 F29)
        run: bash scripts/check-delete-coord.sh

      - name: Cross-harness equivalence
        run: bash scripts/check-cross-harness-equivalence.sh

      - name: Decision replay (sample journal CI gate)
        run: |
          LILARA_CONTRACT_ENABLED=0 LILARA_TRAJECTORY_WINDOW_MIN=0 \
          bash scripts/check-decision-replay.sh

      - name: Replay posture matrix (SCOPE §19 #14, P3.3)
        # §19 #14 (LOCKED 2026-06-13) requires the replay harness to pin the
        # three posture flags (LILARA_TAINT_EGRESS, LILARA_DELETE_COORD,
        # LILARA_KILL_CHAIN_ENFORCE) AND a posture-matrix replay. The matrix
        # gate is two-faced: the canonical baseline (all flags off) MUST be
        # zero-drift (hard-fail, exit 1); the other 7 combinations report
        # their posture surface (drift is the F29 floor engaging, not a
        # regression) and exit 0. This catches a future default flip, a
        # non-deterministic posture read, or a stale-fixture regression in a
        # pinned-floor path BEFORE the shipped corpus can be silently
        # invalidated. Per-posture canonicalization (zero-drift required
        # everywhere) is NEEDS-APPROVAL future work, not bundled here.
        run: bash scripts/check-replay-posture-matrix.sh

      - name: Contract module
        run: bash scripts/check-contract.sh

      - name: Content contract conformance (point (b), ADR-051)
        run: bash scripts/check-content-contract.sh

      - name: Contract schema v2 migration
        run: bash scripts/check-migrate-v1-v2.sh

      - name: Kill-switch (all 13 hooks)
        run: bash scripts/check-kill-switch.sh

      - name: Consent gate (consent-floor + grant-store + transport + adversarial + f6-prompt-wiring + structural invariants)
        # Wires the previously-dormant scripts/check-consent-gate.sh into CI.
        # Runs the 7 consent tests + 3 structural invariants on every push and PR.
        # Tests: consent-floor, consent-grant-store, consent-early-review-fix,
        # consent-enforce-compat, consent-transport, consent-adversarial,
        # consent-f6-prompt-wiring. Invariants: floor-consent.js FS-write purity,
        # transport.js no-process.stdin, D-CONSENT lattice entry present.
        run: bash scripts/check-consent-gate.sh

      - name: Pressure tests (structural check)
        run: bash scripts/check-pressure-tests.sh

      - name: Decide-on-every-call (C1 regression guard)
        run: LILARA_STATE_DIR=$(mktemp -d) bash scripts/check-decide-on-every-call.sh

      - name: Session isolation (trajectory partitioning)
        run: LILARA_STATE_DIR=$(mktemp -d) bash scripts/check-session-isolation.sh

      - name: Decision quality gate (FP/FN bounds — locked at 0/0)
        # Lilara operates on a 0.0% FP / 0.0% FN bar. The script's own defaults
        # are looser (10% / 20%) so downstream teams that haven't tuned their
        # corpus aren't hard-blocked; CI pins both to 0 so any regression that
        # introduces a single FP or FN fails the build, matching the stated bar.
        run: LILARA_EVAL_MAX_FP_PCT=0 LILARA_EVAL_MAX_FN_PCT=0 bash scripts/eval-decision-quality.sh

      - name: Runtime decision bench
        # ADR-044: baselines are committed to artifacts/bench/baseline.json;
        # no cache save/restore needed.
        run: LILARA_BENCH_P99_MS=${{ matrix.bench_p99_ms }} bash scripts/bench-runtime-decision.sh

      - name: Perf regression guard (Task 0.12, 120 flows × 200 iter)
        # ADR-044: baselines are committed to artifacts/perf/baseline.json;
        # no cache save/restore needed.
        run: LILARA_PERF_P99_MS=${{ matrix.bench_p99_ms }} bash scripts/bench-perf-regression.sh
